  {id:50,cat:"Инвентарь",name:"Спрей от комаров / спиральки",unit:"шт",qty:"2-3"}
];

// ── State ─────────────────────────────────────────────────────────────────
var S = {
  userName: localStorage.getItem("picnic_name")||"",
  nameInput: "",
  tab: "list",
  filter: "all",
  items: ITEMS.map(i=>({...i,takenBy:null})),
  receipts: [],
  members: [],
  saving: false,
  scanning: false,
  scanResult: null,
  manualOpen: false,
  manLabel: "",
  manAmount: "",
  toast: null,
  loading: true
};

// ── Firebase sync ─────────────────────────────────────────────────────────
db.on("value", snap => {
  var d = snap.val();
  if(d){
    if(d.items) S.items = d.items;
    if(d.receipts) S.receipts = d.receipts;
    if(d.members) S.members = d.members;
  }
  S.loading = false;
  render();
});

function saveDb(patch){
  S.saving = true; render();
  db.once("value").then(snap=>{
    var prev = snap.val()||{};
    return db.set({...prev,...patch});
  }).then(()=>{ S.saving=false; render(); })
  .catch(e=>{ console.error(e); S.saving=false; render(); });
}

// ── Helpers ───────────────────────────────────────────────────────────────
function fmtMoney(n){
  if(!n&&n!==0) return "0 ₸";
  return new Intl.NumberFormat("ru-KZ",{style:"currency",currency:"KZT",maximumFractionDigits:0}).format(n);
}
function ava(name,size){
  size=size||30;
  var bg=aColor(name);
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:'+Math.round(size*0.38)+'px;font-weight:700;color:#fff;flex-shrink:0">'+name[0].toUpperCase()+'</div>';
}
function chk(on,mine){
  var color=mine?T.accent:"#999";
  var bg=on?(mine?T.accentBg:"#F0F0F0"):"#fff";
  var bdr=on?color:T.border;
  var tick=on?'<svg width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 3.5L4 6.5L10 1" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':"";
  return '<div style="width:24px;height:24px;border-radius:50%;flex-shrink:0;background:'+bg+';border:2px solid '+bdr+';display:flex;align-items:center;justify-content:center">'+tick+'</div>';
}
function showToast(msg){ S.toast=msg; render(); setTimeout(function(){S.toast=null;render();},2600); }
function addMember(who){
  var name=who||S.userName;
  if(!name||S.members.includes(name)) return;
  S.members=[...S.members,name];
  saveDb({members:S.members});
}

// ── Actions (global) ──────────────────────────────────────────────────────
function setTab(t){ S.tab=t; render(); }
function setFilter(f){ S.filter=f; render(); }
function joinName(){
  var t=(S.nameInput||"").trim();
  if(!t) return;
  S.userName=t; localStorage.setItem("picnic_name",t); addMember(t); render();
}
function toggleItem(id){
  if(!S.userName) return;
  S.items=S.items.map(function(item){
    if(item.id!==id) return item;
    if(item.takenBy===S.userName) return Object.assign({},item,{takenBy:null});
    if(item.takenBy) return item;
    return Object.assign({},item,{takenBy:S.userName});
  });
  saveDb({items:S.items}); addMember();
}
function releaseItem(id){
  S.items=S.items.map(function(i){ return i.id===id&&i.takenBy===S.userName?Object.assign({},i,{takenBy:null}):i; });
  saveDb({items:S.items});
}
function deleteReceipt(id){
  S.receipts=S.receipts.filter(function(r){return r.id!==id;});
  saveDb({receipts:S.receipts}); render();
}
function toggleManual(){ S.manualOpen=!S.manualOpen; render(); }
function addManual(){
  var amount=parseFloat((S.manAmount||"").replace(/\s/g,"").replace(",","."));
  if(!(S.manLabel||"").trim()||isNaN(amount)||amount<=0) return;
  var r={id:Date.now(),who:S.userName,label:S.manLabel.trim(),amount:amount,items:[]};
  S.receipts=[...S.receipts,r];
  saveDb({receipts:S.receipts});
  S.manLabel=""; S.manAmount=""; S.manualOpen=false; addMember();
  showToast("Добавлено: "+fmtMoney(amount));
}
function confirmScan(){
  if(!S.scanResult) return;
  var r={id:Date.now(),who:S.userName,label:S.scanResult.store||"Чек",amount:S.scanResult.total,items:S.scanResult.items||[]};
  S.receipts=[...S.receipts,r];
  saveDb({receipts:S.receipts});
  var amt=S.scanResult.total; S.scanResult=null; addMember();
  showToast("Добавлено: "+fmtMoney(amt));
}
function cancelScan(){ S.scanResult=null; render(); }
function resetAll(){
  if(!confirm("Сбросить всё?")) return;
  S.items=ITEMS.map(function(i){return Object.assign({},i,{takenBy:null});});
  S.receipts=[]; S.members=[];
  saveDb({items:S.items,receipts:[],members:[]}); render();
}
function handleFile(input){
  var file=input.files[0]; if(!file) return;
  S.scanning=true; S.scanResult=null; render();
  var reader=new FileReader();
  reader.onload=function(){
    var b64=reader.result.split(",")[1];
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:1000,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},
          {type:"text",text:'Это фото чека. Верни ТОЛЬКО JSON без markdown:\n{"store":"название или пустая строка","total":число,"items":[{"name":"...","amount":число}]}\nЕсли нечитаемо: {"error":"не удалось прочитать"}'}
        ]}]
      })
    }).then(function(r){return r.json();}).then(function(data){
      var text=(data.content||[]).filter(function(b){return b.type==="text";})[0];
      if(!text){showToast("Ошибка");return;}
      var parsed=JSON.parse(text.text.replace(/```json|```/g,"").trim());
      if(parsed.error) showToast("Не удалось прочитать чек");
      else { S.scanResult=parsed; render(); }
    }).catch(function(){ showToast("Ошибка сканирования"); })
    .finally(function(){ S.scanning=false; input.value=""; render(); });
  };
  reader.readAsDataURL(file);
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  var app=document.getElementById("app");
  if(!app) return;
  app.innerHTML=buildHTML();
  var ni=document.getElementById("ni");
  if(ni){ ni.value=S.nameInput||""; }
  var ml=document.getElementById("ml");
  if(ml){ ml.value=S.manLabel||""; }
  var ma=document.getElementById("ma");
  if(ma){ ma.value=S.manAmount||""; }
}

function buildHTML(){
  if(S.loading) return '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column"><div style="width:20px;height:20px;border:2.5px solid '+T.accent+';border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px"></div><div style="color:'+T.muted+';font-size:13px;font-weight:500">Загружаем...</div></div>';
  if(!S.userName) return buildLogin();
  return buildMain();
}

function buildLogin(){
  return '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">'+
  '<div style="width:100%;max-width:340px">'+
  '<div style="margin-bottom:36px">'+
  '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
  '<div style="width:52px;height:52px;border-radius:14px;background:'+T.accent+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
  '<svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M14 3C14 3 6 8 6 16C6 20.418 9.582 24 14 24C18.418 24 22 20.418 22 16C22 8 14 3Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/><path d="M10 16l3 3 6-6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
  '</div>'+
  '<div><div style="font-size:22px;font-weight:800;color:'+T.text+';letter-spacing:-0.5px">Пикник 2026</div><div style="font-size:12px;color:'+T.muted+';font-weight:500;margin-top:3px">список и касса</div></div>'+
  '</div>'+
  '<div style="width:100%;height:2px;background:linear-gradient(90deg,'+T.accent+',transparent)"></div>'+
  '</div>'+
  '<div style="font-size:12px;font-weight:700;color:'+T.muted+';text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Как тебя зовут?</div>'+
  '<input id="ni" placeholder="Введи имя" oninput="S.nameInput=this.value" onkeydown="if(event.key===\'Enter\')joinName()" style="width:100%;padding:14px 16px;background:'+T.surface+';border:1.5px solid '+T.border+';border-radius:12px;font-size:16px;font-weight:500;color:'+T.text+';outline:none;margin-bottom:12px;caret-color:'+T.accent+'"/>'+
  '<button onclick="joinName()" class="tappable" style="width:100%;padding:14px;background:'+T.accent+';color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">Войти</button>'+
  '<div style="margin-top:14px;font-size:12px;color:'+T.muted+';text-align:center;line-height:1.6">Список общий — все видят изменения в реальном времени</div>'+
  '</div></div>';
}

function buildMain(){
  var cats=[...new Set(ITEMS.map(function(i){return i.cat;}))];
  var unclaimed=S.items.filter(function(i){return !i.takenBy;}).length;
  var myTaken=S.items.filter(function(i){return i.takenBy===S.userName;}).length;
  var taken=S.items.filter(function(i){return i.takenBy;}).length;
  var pct=Math.round(taken/S.items.length*100);
  var totalSpent=S.receipts.reduce(function(s,r){return s+r.amount;},0);
  var everyone=[...new Set([...S.members,...S.items.filter(function(i){return i.takenBy;}).map(function(i){return i.takenBy;}),...S.receipts.map(function(r){return r.who;})])].filter(Boolean);
  var perPerson=everyone.length>0?totalSpent/everyone.length:0;
  var balances=everyone.map(function(m){
    var paid=S.receipts.filter(function(r){return r.who===m;}).reduce(function(s,r){return s+r.amount;},0);
    return {name:m,paid:paid,owes:perPerson-paid};
  });

  var header='<div style="position:sticky;top:0;z-index:20;background:rgba(255,255,255,0.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid '+T.border+'">'+
  '<div style="max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:54px">'+
  '<div style="display:flex;align-items:center;gap:10px">'+
  '<div style="width:8px;height:8px;border-radius:50%;background:'+(S.saving?T.warn:T.accent)+';transition:background 0.3s"></div>'+
  '<span style="font-size:16px;font-weight:800;color:'+T.text+';letter-spacing:-0.3px">Пикник 2026</span>'+
  '</div>'+ava(S.userName,32)+
  '</div></div>';

  var tabContent="";

  // LIST
  if(S.tab==="list"){
    var filtered=S.items.filter(function(i){
      if(S.filter==="mine") return i.takenBy===S.userName;
      if(S.filter==="unclaimed") return !i.takenBy;
      return true;
    });
    var grouped={};
    cats.forEach(function(cat){
      var list=filtered.filter(function(i){return i.cat===cat;});
      if(list.length) grouped[cat]=list;
    });
    var filterBtns=["all","unclaimed","mine"].map(function(k){
      var labels={"all":"Все","unclaimed":"Не взято "+unclaimed,"mine":"Мои "+myTaken};
      var on=S.filter===k;
      return '<button onclick="setFilter(\''+k+'\')" class="pill" style="padding:8px 18px;border-radius:20px;border:1.5px solid '+(on?T.accent:T.border)+';background:'+(on?T.accentBg:"#fff")+';color:'+(on?T.accent:T.muted)+';font-size:13px;font-weight:'+(on?700:500)+';cursor:pointer;white-space:nowrap">'+labels[k]+'</button>';
    }).join("");
    var listGroups=Object.keys(grouped).map(function(cat){
      var catItems=grouped[cat];
      var rows=catItems.map(function(item,idx){
        var isMine=item.takenBy===S.userName;
        var isTaken=!!item.takenBy&&!isMine;
        var right=item.takenBy
          ? ava(item.takenBy,22)+'<span style="font-size:13px;color:'+(isMine?T.accent:T.muted)+';font-weight:'+(isMine?700:500)+'">'+item.takenBy+'</span>'+(isMine?'<button onclick="event.stopPropagation();releaseItem('+item.id+')" style="width:18px;height:18px;border-radius:50%;background:rgba(217,64,64,0.1);border:1px solid rgba(217,64,64,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0"><svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 1l6 6M7 1L1 7" stroke="'+T.danger+'" stroke-width="1.6" stroke-linecap="round"/></svg></button>':"")
          : '<span style="font-size:12px;color:'+T.warn+';font-weight:600">не взято</span>';
        return '<div onclick="'+(isTaken?"":"toggleItem("+item.id+")")+'" class="row" style="display:flex;align-items:center;gap:12px;padding:13px 16px;background:'+(isMine?T.accentBg:"#fff")+';cursor:'+(isTaken?"default":"pointer")+';border-bottom:'+(idx<catItems.length-1?"1px solid "+T.border:"none")+'">'+
          chk(!!item.takenBy,isMine)+
          '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:500;color:'+(item.takenBy?T.faint:T.text)+';text-decoration:'+(isTaken?"line-through":"none")+'">'+item.name+'</div><div style="font-size:11px;color:'+T.faint+';margin-top:1px">'+item.qty+' '+item.unit+'</div></div>'+
          '<div style="display:flex;align-items:center;gap:7px;flex-shrink:0">'+right+'</div>'+
          '</div>';
      }).join("");
      return '<div style="margin-bottom:12px"><div style="font-size:10px;font-weight:700;color:'+T.muted+';text-transform:uppercase;letter-spacing:1.5px;padding:0 4px 8px">'+cat+'</div><div style="background:#fff;border-radius:16px;border:1px solid '+T.border+';overflow:hidden">'+rows+'</div></div>';
    }).join("");

    tabContent='<div style="background:'+T.accent+';border-radius:20px;padding:22px 22px 20px;margin-bottom:14px;position:relative;overflow:hidden">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
      '<div><div style="font-size:12px;color:rgba(255,255,255,0.65);font-weight:600;text-transform:uppercase;letter-spacing:0.8px">Готовность</div><div style="font-size:52px;font-weight:800;color:#fff;letter-spacing:-2px;line-height:1;margin-top:4px">'+pct+'<span style="font-size:22px;font-weight:600">%</span></div></div>'+
      '<div style="text-align:right"><div style="font-size:12px;color:rgba(255,255,255,0.65);font-weight:600">Взято</div><div style="font-size:28px;font-weight:800;color:#fff">'+taken+'<span style="font-size:14px;color:rgba(255,255,255,0.6);">/'+S.items.length+'</span></div></div>'+
      '</div>'+
      '<div style="margin-top:16px;height:5px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;background:rgba(255,255,255,0.9);width:'+pct+'%;transition:width 0.5s"></div></div>'+
      '<div style="display:flex;gap:20px;margin-top:12px"><span style="font-size:13px;color:rgba(255,255,255,0.75)">Мои <b>'+myTaken+'</b></span><span style="font-size:13px;color:rgba(255,255,255,0.75)">Не взято <b style="color:'+(unclaimed>0?"#FCD34D":"#fff")+'">'+unclaimed+'</b></span></div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px">'+filterBtns+'</div>'+
      listGroups+
      (Object.keys(grouped).length===0?'<div style="text-align:center;color:'+T.faint+';margin-top:60px;font-size:14px">Ничего не найдено</div>':"");
  }

  // CASH
  if(S.tab==="cash"){
    var scanPrev=S.scanResult?
      '<div style="background:#fff;border:1.5px solid '+T.accent+';border-radius:16px;padding:18px;margin-bottom:14px">'+
      '<div style="font-size:11px;font-weight:700;color:'+T.accent+';text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px">Чек распознан</div>'+
      (S.scanResult.store?'<div style="font-size:15px;font-weight:600;color:'+T.text+';margin-bottom:8px">'+S.scanResult.store+'</div>':"")+ 
      (S.scanResult.items||[]).slice(0,5).map(function(it,i){return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid '+T.border+'"><span style="font-size:13px;color:'+T.muted+'">'+it.name+'</span><span style="font-size:13px;font-weight:600">'+fmtMoney(it.amount)+'</span></div>';}).join("")+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">'+
      '<div style="font-size:22px;font-weight:800;color:'+T.accent+'">'+fmtMoney(S.scanResult.total)+'</div>'+
      '<div style="display:flex;gap:8px"><button onclick="cancelScan()" style="padding:9px 16px;border-radius:10px;border:1px solid '+T.border+';background:#fff;color:'+T.muted+';cursor:pointer;font-size:13px;font-weight:600">Отмена</button><button onclick="confirmScan()" style="padding:9px 18px;border-radius:10px;border:none;background:'+T.accent+';color:#fff;cursor:pointer;font-size:13px;font-weight:700">Добавить</button></div>'+
      '</div></div>':"";

    var manForm=S.manualOpen?
      '<div style="background:#fff;border:1px solid '+T.border+';border-radius:16px;padding:18px;margin-bottom:14px">'+
      '<div style="font-size:12px;font-weight:700;color:'+T.muted+';text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px">Добавить расход</div>'+
      '<input id="ml" placeholder="Что купил" oninput="S.manLabel=this.value" style="width:100%;padding:11px 14px;background:'+T.surface+';border:1px solid '+T.border+';border-radius:10px;color:'+T.text+';font-size:14px;outline:none;margin-bottom:10px;caret-color:'+T.accent+'"/>'+
      '<input id="ma" placeholder="Сумма в тенге" type="number" inputmode="numeric" oninput="S.manAmount=this.value" style="width:100%;padding:11px 14px;background:'+T.surface+';border:1px solid '+T.border+';border-radius:10px;color:'+T.text+';font-size:14px;outline:none;margin-bottom:12px;caret-color:'+T.accent+'"/>'+
      '<div style="display:flex;gap:8px"><button onclick="toggleManual()" style="flex:1;padding:11px;border-radius:10px;border:1px solid '+T.border+';background:#fff;color:'+T.muted+';cursor:pointer;font-size:13px;font-weight:600">Отмена</button><button onclick="addManual()" style="flex:2;padding:11px;border-radius:10px;border:none;background:'+T.accent+';color:#fff;cursor:pointer;font-size:13px;font-weight:700">Добавить</button></div>'+
      '</div>':"";

    var rlist=S.receipts.length>0?
      '<div style="margin-top:14px"><div style="font-size:10px;font-weight:700;color:'+T.muted+';text-transform:uppercase;letter-spacing:1.5px;padding:0 4px 8px">Расходы</div>'+
      '<div style="background:#fff;border-radius:16px;border:1px solid '+T.border+';overflow:hidden">'+
      S.receipts.map(function(r,idx){return '<div style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:'+(idx<S.receipts.length-1?"1px solid "+T.border:"none")+'">'+ava(r.who,30)+'<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;color:'+T.text+'">'+r.label+'</div><div style="font-size:12px;color:'+T.muted+';margin-top:1px">'+r.who+'</div></div><div style="font-size:16px;font-weight:800;color:'+T.blue+'">'+fmtMoney(r.amount)+'</div>'+(r.who===S.userName?'<button onclick="deleteReceipt('+r.id+')" style="width:18px;height:18px;border-radius:50%;background:rgba(217,64,64,0.08);border:1px solid rgba(217,64,64,0.2);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0"><svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 1l6 6M7 1L1 7" stroke="'+T.danger+'" stroke-width="1.6" stroke-linecap="round"/></svg></button>':"")+'</div>';}).join("")+
      '</div></div>':"";

    var balBlock=everyone.length>0&&totalSpent>0?
      '<div style="margin-top:14px;padding-top:14px;border-top:1px solid '+T.border+'">'+
      '<div style="text-align:center;font-size:12px;color:'+T.faint+';font-weight:600;text-transform:uppercase;margin-bottom:10px">С каждого '+fmtMoney(perPerson)+'</div>'+
      balances.map(function(b){return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid '+T.border+'">'+ava(b.name,26)+'<span style="flex:1;font-size:14px;font-weight:600;color:'+T.text+'">'+b.name+'</span><span style="font-size:12px;color:'+T.muted+'">'+fmtMoney(b.paid)+'</span><span style="font-size:13px;font-weight:700;color:'+(b.owes>50?T.danger:b.owes<-50?T.accent:T.faint)+'">'+(b.owes>50?"-"+fmtMoney(b.owes):b.owes<-50?"+"+fmtMoney(-b.owes):"ок")+'</span></div>';}).join("")+
      '</div>':"";

    tabContent='<div style="background:#fff;border:1px solid '+T.border+';border-radius:20px;padding:22px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06)">'+
      '<div style="font-size:11px;font-weight:700;color:'+T.muted+';text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Общая сумма</div>'+
      '<div style="font-size:44px;font-weight:800;color:'+T.blue+';letter-spacing:-2px;line-height:1">'+fmtMoney(totalSpent)+'</div>'+
      balBlock+'</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+
      '<button onclick="document.getElementById(\'fi\').click()" class="btn" style="padding:18px 14px;border-radius:16px;background:'+(S.scanning?T.surface:T.accentBg)+';border:1.5px solid '+T.accent+';color:'+T.accent+';font-size:13px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px">'+
      (S.scanning?'<div style="width:22px;height:22px;border:2.5px solid '+T.accent+';border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div>':'<svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="3" y="5" width="20" height="16" rx="3" stroke="'+T.accent+'" stroke-width="1.6"/><circle cx="13" cy="13" r="4" stroke="'+T.accent+'" stroke-width="1.6"/><rect x="9" y="3" width="8" height="3" rx="1.5" fill="'+T.accent+'"/></svg>')+
      (S.scanning?"Читаем...":"Сфото чек")+'</button>'+
      '<button onclick="toggleManual()" class="btn" style="padding:18px 14px;border-radius:16px;background:#fff;border:1.5px solid '+T.border+';color:'+T.text+';font-size:13px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px"><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M13 4v18M4 13h18" stroke="'+T.muted+'" stroke-width="2" stroke-linecap="round"/></svg>Вручную</button>'+
      '</div>'+
      '<input id="fi" type="file" accept="image/*" capture="environment" onchange="handleFile(this)" style="display:none"/>'+
      scanPrev+manForm+rlist+
      (S.receipts.length===0&&!S.scanResult&&!S.manualOpen?'<div style="text-align:center;color:'+T.faint+';margin-top:48px;font-size:14px;line-height:1.7">Пока пусто.<br/>Сфотографируй чек или добавь вручную.</div>':"");
  }

  // ИТОГ
  if(S.tab==="itog"){
    if(everyone.length===0){
      tabContent='<div style="text-align:center;color:'+T.faint+';margin-top:60px;font-size:14px;line-height:1.7">Пока никто ничего не отметил.<br/>Зайди в Список и возьми пункты.</div>';
    } else {
      var hero=totalSpent>0?'<div style="background:'+T.accent+';border-radius:20px;padding:20px 22px;margin-bottom:14px;color:#fff"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;opacity:0.7;margin-bottom:6px">Итог по кассе</div><div style="font-size:36px;font-weight:800;letter-spacing:-1.5px">'+fmtMoney(totalSpent)+'</div><div style="font-size:13px;opacity:0.75;margin-top:4px">С каждого: '+fmtMoney(perPerson)+' · '+everyone.length+' участников</div></div>':"";

      var cards=everyone.map(function(person){
        var myItems=S.items.filter(function(i){return i.takenBy===person;});
        var myR=S.receipts.filter(function(r){return r.who===person;});
        var paid=myR.reduce(function(s,r){return s+r.amount;},0);
        var balance=paid-perPerson;
        var badge=totalSpent>0?'<div style="padding:6px 12px;border-radius:10px;background:'+(balance>50?T.accentBg:balance<-50?"#FEF0F0":T.surface)+';border:1px solid '+(balance>50?T.accent:balance<-50?T.danger:T.border)+'"><div style="font-size:11px;font-weight:700;color:'+(balance>50?T.accent:balance<-50?T.danger:T.muted)+';text-align:center">'+(balance>50?"получить":balance<-50?"должен":"ок")+'</div>'+(Math.abs(balance)>50?'<div style="font-size:14px;font-weight:800;color:'+(balance>50?T.accent:T.danger)+';text-align:center">'+fmtMoney(Math.abs(balance))+'</div>':"")+'</div>':"";
        var tags=myItems.length>0?'<div style="padding:12px 18px;border-bottom:'+(myR.length>0?"1px solid "+T.border:"none")+'"><div style="font-size:10px;font-weight:700;color:'+T.faint+';text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Везёт</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+myItems.map(function(item){return '<span style="font-size:12px;font-weight:500;background:'+T.surface+';border-radius:8px;padding:4px 10px;border:1px solid '+T.border+'">'+item.name+'</span>';}).join("")+'</div></div>':"";
        var rrows=myR.length>0?'<div style="padding:12px 18px"><div style="font-size:10px;font-weight:700;color:'+T.faint+';text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Оплатил</div>'+myR.map(function(r,i){return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:'+(i<myR.length-1?"1px solid "+T.border:"none")+'"><span style="font-size:13px;color:'+T.muted+'">'+r.label+'</span><span style="font-size:13px;font-weight:700;color:'+T.blue+'">'+fmtMoney(r.amount)+'</span></div>';}).join("")+'</div>':"";
        return '<div style="background:#fff;border-radius:18px;border:1px solid '+T.border+';margin-bottom:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.05)"><div style="display:flex;align-items:center;gap:12px;padding:16px 18px 14px;border-bottom:'+(myItems.length>0||myR.length>0?"1px solid "+T.border:"none")+'">'+ava(person,40)+'<div style="flex:1"><div style="font-size:16px;font-weight:800;color:'+T.text+'">'+person+'</div><div style="font-size:12px;color:'+T.muted+';margin-top:2px">'+myItems.length+' вещей · '+fmtMoney(paid)+'</div></div>'+badge+'</div>'+tags+rrows+'</div>';
      }).join("");

      var debtors=balances.filter(function(b){return b.owes>50;}).sort(function(a,b){return b.owes-a.owes;});
      var creditors=balances.filter(function(b){return b.owes<-50;}).sort(function(a,b){return a.owes-b.owes;});
      var transfers="";
      if(totalSpent>0&&debtors.length>0){
        var trows=debtors.map(function(d){return creditors.map(function(c){return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid '+T.border+'">'+ava(d.name,26)+'<div style="flex:1;font-size:13px"><b>'+d.name+'</b><span style="color:'+T.muted+'"> → </span><b>'+c.name+'</b></div><span style="font-size:14px;font-weight:800;color:'+T.accent+'">'+fmtMoney(Math.min(d.owes,-c.owes))+'</span></div>';}).join("");}).join("");
        transfers='<div style="background:#fff;border-radius:18px;border:1px solid '+T.border+';padding:16px 18px;margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:'+T.faint+';text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Кто кому переводит</div>'+trows+'</div>';
      }
      tabContent=hero+cards+transfers;
    }
  }

  // TABBAR
  var tabs=[
    {key:"list",label:"Список",badge:unclaimed>0?unclaimed:null,bc:T.warn,icon:'<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M8 5.5h10M8 11h10M8 16.5h10" stroke="'+(S.tab==="list"?T.accent:T.faint)+'" stroke-width="1.8" stroke-linecap="round"/><circle cx="4.5" cy="5.5" r="1.5" fill="'+(S.tab==="list"?T.accent:T.faint)+'"/><circle cx="4.5" cy="11" r="1.5" fill="'+(S.tab==="list"?T.accent:T.faint)+'"/><circle cx="4.5" cy="16.5" r="1.5" fill="'+(S.tab==="list"?T.accent:T.faint)+'"/></svg>',ac:T.accent},
    {key:"cash",label:"Касса",badge:S.receipts.length>0?S.receipts.length:null,bc:T.blue,icon:'<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="6" width="18" height="12" rx="2.5" stroke="'+(S.tab==="cash"?T.blue:T.faint)+'" stroke-width="1.8"/><path d="M6 11h10M6 14h5" stroke="'+(S.tab==="cash"?T.blue:T.faint)+'" stroke-width="1.5" stroke-linecap="round"/><path d="M2 10h18" stroke="'+(S.tab==="cash"?T.blue:T.faint)+'" stroke-width="1.5"/></svg>',ac:T.blue},
    {key:"itog",label:"Итог",badge:null,bc:T.purple,icon:'<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8.5" stroke="'+(S.tab==="itog"?T.purple:T.faint)+'" stroke-width="1.8"/><path d="M11 7v4.5l3 2" stroke="'+(S.tab==="itog"?T.purple:T.faint)+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',ac:T.purple}
  ];
  var tabbar='<div style="position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(255,255,255,0.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid '+T.border+';display:flex;padding-bottom:env(safe-area-inset-bottom,0px)">'+
    tabs.map(function(t){var on=S.tab===t.key; return '<button onclick="setTab(\''+t.key+'\')" class="pill" style="flex:1;padding:10px 8px 12px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative">'+(t.badge!=null?'<div style="position:absolute;top:7px;right:calc(50% - 18px);background:'+t.bc+';color:#fff;border-radius:8px;font-size:9px;font-weight:700;padding:1px 5px;min-width:15px;text-align:center">'+t.badge+'</div>':"")+'<div>'+t.icon+'</div><span style="font-size:10px;font-weight:'+(on?700:500)+';color:'+(on?t.ac:T.faint)+';letter-spacing:0.3px">'+t.label+'</span></button>';}).join("")+
    '</div>';

  var toast=S.toast?'<div style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:'+T.text+';color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.18);z-index:100;white-space:nowrap;animation:fadeUp 0.22s ease">'+S.toast+'</div>':"";

  var resetBtn='<div style="text-align:center;margin-top:28px"><button onclick="resetAll()" class="tappable" style="background:none;border:none;cursor:pointer;color:'+T.faint+';font-size:12px;font-weight:600;padding:8px;text-transform:uppercase;letter-spacing:0.5px">Сбросить всё</button></div>';

  return header+'<div style="max-width:640px;margin:0 auto;padding:16px 16px 8px">'+tabContent+resetBtn+'</div>'+tabbar+toast;
}

// Первый рендер
render();
</script>
</body>
</html>
