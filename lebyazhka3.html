function dbGet(){return fetch(DB+".json").then(function(r){return r.json();});}
function dbSet(){
  S.saving=true;render();
  fetch(DB+".json",{method:"PUT",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({items:S.items,receipts:S.receipts,members:S.members})})
  .then(function(){S.saving=false;render();})
  .catch(function(){S.saving=false;render();});
}

function load(){
  dbGet().then(function(d){
    if(d){
      if(d.items)S.items=d.items;
      if(d.receipts)S.receipts=d.receipts;
      if(d.members)S.members=d.members;
    }
    S.loading=false;render();
    setInterval(function(){
      dbGet().then(function(d){
        if(!d)return;
        if(d.items)S.items=d.items;
        if(d.receipts)S.receipts=d.receipts;
        if(d.members)S.members=d.members;
        render();
      });
    },5000);
  }).catch(function(){S.loading=false;render();});
}

function fmt(n){
  if(!n&&n!==0)return "0 ₸";
  return new Intl.NumberFormat("ru-KZ",{style:"currency",currency:"KZT",maximumFractionDigits:0}).format(n);
}
function ava(name,sz){
  sz=sz||30;
  var bg=aclr(name),tc=bg==="#D4FF00"?"#111":"#fff";
  return "<div style='width:"+sz+"px;height:"+sz+"px;border-radius:50%;background:"+bg+";display:flex;align-items:center;justify-content:center;font-size:"+Math.round(sz*0.4)+"px;font-weight:800;color:"+tc+";flex-shrink:0'>"+name[0].toUpperCase()+"</div>";
}
function chk(on,mine){
  var c=mine?"#D4FF00":"#555";
  var bg=on?(mine?"rgba(212,255,0,0.15)":"rgba(255,255,255,0.08)"):"transparent";
  var tick=on?"<svg width='11' height='8' viewBox='0 0 11 8' fill='none'><path d='M1 3.5L4 6.5L10 1' stroke='"+c+"' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/></svg>":"";
  return "<div style='width:24px;height:24px;border-radius:50%;flex-shrink:0;background:"+bg+";border:2px solid "+(on?c:"#444")+";display:flex;align-items:center;justify-content:center'>"+tick+"</div>";
}

function showToast(msg){S.toast=msg;render();setTimeout(function(){S.toast=null;render();},2600);}
function addMember(who){
  var n=who||S.name;if(!n||S.members.includes(n))return;
  S.members=[...S.members,n];dbSet();
}
function setTab(t){S.tab=t;render();}
function setFilter(f){S.filter=f;render();}
function join(){
  var t=(S.ni||"").trim();if(!t)return;
  S.name=t;localStorage.setItem("lb_name",t);addMember(t);render();
}
function toggle(id){
  if(!S.name)return;
  S.items=S.items.map(function(x){
    if(x.id!==id)return x;
    if(x.takenBy===S.name)return Object.assign({},x,{takenBy:null});
    if(x.takenBy)return x;
    return Object.assign({},x,{takenBy:S.name});
  });
  dbSet();addMember();
}
function release(id){
  S.items=S.items.map(function(x){return x.id===id&&x.takenBy===S.name?Object.assign({},x,{takenBy:null}):x;});
  dbSet();
}
function delR(id){S.receipts=S.receipts.filter(function(r){return r.id!==id;});dbSet();render();}
function togM(){S.mOpen=!S.mOpen;render();}
function addM(){
  var amt=parseFloat((S.mAmt||"").replace(/\s/g,"").replace(",","."));
  if(!(S.mLabel||"").trim()||isNaN(amt)||amt<=0)return;
  S.receipts=[...S.receipts,{id:Date.now(),who:S.name,label:S.mLabel.trim(),amount:amt,items:[]}];
  dbSet();S.mLabel="";S.mAmt="";S.mOpen=false;addMember();showToast("Добавлено: "+fmt(amt));
}
function confScan(){
  if(!S.scan)return;
  S.receipts=[...S.receipts,{id:Date.now(),who:S.name,label:S.scan.store||"Чек",amount:S.scan.total,items:S.scan.items||[]}];
  dbSet();var a=S.scan.total;S.scan=null;addMember();showToast("Добавлено: "+fmt(a));
}
function canScan(){S.scan=null;render();}
function resetAll(){
  if(!confirm("Сбросить всё?"))return;
  S.items=ITEMS.map(function(i){return Object.assign({},i,{takenBy:null});});
  S.receipts=[];S.members=[];dbSet();render();
}
function handleFile(inp){
  var file=inp.files[0];if(!file)return;
  S.scanning=true;S.scan=null;render();
  var rd=new FileReader();
  rd.onload=function(){
    var b64=rd.result.split(",")[1];
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},
        {type:"text",text:"Фото чека. Верни ТОЛЬКО JSON: {store:строка,total:число,items:[{name:строка,amount:число}]}. Если нечитаемо: {error:да}"}
      ]}]})
    }).then(function(r){return r.json();}).then(function(d){
      var t=(d.content||[]).find(function(b){return b.type==="text";});
      if(!t){showToast("Ошибка");return;}
      try{
        var p=JSON.parse(t.text.replace(/```json|```/g,"").trim());
        if(p.error)showToast("Не удалось прочитать");
        else{S.scan=p;render();}
      }catch(e){showToast("Ошибка чтения");}
    }).catch(function(){showToast("Ошибка");})
    .finally(function(){S.scanning=false;inp.value="";render();});
  };
  rd.readAsDataURL(file);
}

function render(){
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML=buildHtml();
  // Use addEventListener to avoid quote conflicts
  var ni=document.getElementById("ni");
  if(ni){
    ni.value=S.ni||"";
    ni.oninput=function(){S.ni=this.value;};
    ni.addEventListener("keydown",function(e){if(e.key==="Enter")join();});
  }
  var ml=document.getElementById("ml");
  if(ml){ml.value=S.mLabel||"";ml.oninput=function(){S.mLabel=this.value;};}
  var ma=document.getElementById("ma");
  if(ma){ma.value=S.mAmt||"";ma.oninput=function(){S.mAmt=this.value;};}
  // Attach row click handlers via data attributes
  document.querySelectorAll("[data-toggle]").forEach(function(el){
    el.addEventListener("click",function(){toggle(parseInt(this.dataset.toggle));});
  });
  document.querySelectorAll("[data-release]").forEach(function(el){
    el.addEventListener("click",function(e){e.stopPropagation();release(parseInt(this.dataset.release));});
  });
  document.querySelectorAll("[data-delr]").forEach(function(el){
    el.addEventListener("click",function(){delR(parseInt(this.dataset.delr));});
  });
  document.querySelectorAll("[data-tab]").forEach(function(el){
    el.addEventListener("click",function(){setTab(this.dataset.tab);});
  });
  document.querySelectorAll("[data-filter]").forEach(function(el){
    el.addEventListener("click",function(){setFilter(this.dataset.filter);});
  });
}

      }).join("");
      return "<div style='margin-bottom:14px'><div style='font-size:13px;font-weight:800;color:#D4FF00;letter-spacing:2px;text-transform:uppercase;padding:0 4px 8px;border-bottom:1px solid rgba(212,255,0,0.2);margin-bottom:4px'>"+cat+"</div><div style='background:#222;border-radius:4px;border:1px solid #333;overflow:hidden'>"+rows+"</div></div>";
    }).join("");

    body="<div style='background:#222;border:1px solid #333;border-radius:4px;padding:20px;margin-bottom:14px'>"+
      "<div style='display:flex;justify-content:space-between;align-items:flex-start'>"+
      "<div><div style='font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px'>Готовность</div>"+
      "<div style='font-size:64px;font-weight:900;color:#D4FF00;line-height:1'>"+pct+"%</div></div>"+
      "<div style='text-align:right'><div style='font-size:11px;color:#888;font-weight:700;text-transform:uppercase'>Взято</div>"+
      "<div style='font-size:36px;font-weight:900;color:#fff'>"+taken+"<span style='font-size:18px;color:#555'>/"+S.items.length+"</span></div></div></div>"+
      "<div style='margin-top:12px;height:4px;background:#333;border-radius:2px;overflow:hidden'>"+
      "<div style='height:100%;background:#D4FF00;width:"+pct+"%;transition:width 0.5s'></div></div>"+
      "<div style='display:flex;gap:20px;margin-top:10px'>"+
      "<span style='font-size:12px;color:#888'>Мои <b style='color:#D4FF00'>"+my+"</b></span>"+
      "<span style='font-size:12px;color:#888'>Не взято <b style='color:"+(unc>0?"#FF9500":"#D4FF00")+"'>"+unc+"</b></span></div></div>"+
      "<div style='display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px'>"+fbts+"</div>"+grpHtml+
      (Object.keys(grp).length===0?"<div style='text-align:center;color:#444;margin-top:60px;font-size:14px'>Ничего не найдено</div>":"");
  }

  if(S.tab==="cash"){
    var balHtml=all.length>0&&total>0?
      "<div style='margin-top:16px;padding-top:16px;border-top:1px solid #333'>"+
      "<div style='font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px'>С каждого "+fmt(pp)+"</div>"+
      bal.map(function(b){return "<div style='display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #333'>"+ava(b.name,26)+"<span style='flex:1;font-size:14px;font-weight:600'>"+b.name+"</span><span style='font-size:12px;color:#888'>"+fmt(b.paid)+"</span><span style='font-size:13px;font-weight:800;color:"+(b.owes>50?"#FF4444":b.owes<-50?"#D4FF00":"#666")+"'>"+(b.owes>50?"-"+fmt(b.owes):b.owes<-50?"+"+fmt(-b.owes):"ок")+"</span></div>";}).join("")+"</div>":"";

    var sprev=S.scan?
      "<div style='background:#222;border:2px solid #D4FF00;border-radius:4px;padding:18px;margin-bottom:14px'>"+
      "<div style='font-size:12px;font-weight:800;color:#D4FF00;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px'>Чек распознан</div>"+
      (S.scan.store?"<div style='font-size:15px;font-weight:600;margin-bottom:8px'>"+S.scan.store+"</div>":"")+
      (S.scan.items||[]).slice(0,5).map(function(it){return "<div style='display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #333'><span style='font-size:13px;color:#888'>"+it.name+"</span><span style='font-size:13px;font-weight:700'>"+fmt(it.amount)+"</span></div>";}).join("")+
      "<div style='display:flex;justify-content:space-between;align-items:center;margin-top:12px'>"+
      "<div style='font-size:28px;font-weight:900;color:#D4FF00'>"+fmt(S.scan.total)+"</div>"+
      "<div style='display:flex;gap:8px'>"+
      "<button onclick='canScan()' style='padding:9px 16px;border-radius:4px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;font-size:13px;font-weight:600'>Отмена</button>"+
      "<button onclick='confScan()' style='padding:9px 18px;border-radius:4px;border:none;background:#D4FF00;color:#111;cursor:pointer;font-size:13px;font-weight:800'>Добавить</button>"+
      "</div></div></div>":"";

    var mform=S.mOpen?
      "<div style='background:#222;border:1px solid #333;border-radius:4px;padding:18px;margin-bottom:14px'>"+
      "<div style='font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px'>Добавить расход</div>"+
      "<input id='ml' placeholder='Что купил' style='width:100%;padding:11px 14px;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#fff;font-size:14px;outline:none;margin-bottom:10px;caret-color:#D4FF00'/>"+
      "<input id='ma' placeholder='Сумма в тенге' type='number' inputmode='numeric' style='width:100%;padding:11px 14px;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#fff;font-size:14px;outline:none;margin-bottom:12px;caret-color:#D4FF00'/>"+
      "<div style='display:flex;gap:8px'>"+
      "<button onclick='togM()' style='flex:1;padding:11px;border-radius:4px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;font-size:13px;font-weight:600'>Отмена</button>"+
      "<button onclick='addM()' style='flex:2;padding:11px;border-radius:4px;border:none;background:#D4FF00;color:#111;cursor:pointer;font-size:14px;font-weight:800'>Добавить</button>"+
      "</div></div>":"";

    var rlist=S.receipts.length>0?
      "<div style='margin-top:14px'><div style='font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px'>Расходы</div>"+
      "<div style='background:#222;border-radius:4px;border:1px solid #333;overflow:hidden'>"+
      S.receipts.map(function(r,idx){return "<div style='display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:"+(idx<S.receipts.length-1?"1px solid #333":"none")+"'>"+ava(r.who,30)+"<div style='flex:1;min-width:0'><div style='font-size:14px;font-weight:600'>"+r.label+"</div><div style='font-size:12px;color:#888;margin-top:1px'>"+r.who+"</div></div><div style='font-size:18px;font-weight:900;color:#D4FF00'>"+fmt(r.amount)+"</div>"+(r.who===S.name?"<button data-delr='"+r.id+"' style='width:18px;height:18px;border-radius:50%;background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0'><svg width='8' height='8' viewBox='0 0 8 8' fill='none'><path d='M1 1l6 6M7 1L1 7' stroke='#FF4444' stroke-width='1.6' stroke-linecap='round'/></svg></button>":"")+"</div>";}).join("")+"</div></div>":"";

    body="<div style='background:#222;border:1px solid #333;border-radius:4px;padding:22px;margin-bottom:14px'>"+
      "<div style='font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px'>Общая сумма</div>"+
      "<div style='font-size:52px;font-weight:900;color:#D4FF00;line-height:1'>"+fmt(total)+"</div>"+
      balHtml+"</div>"+
      "<div style='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px'>"+
      "<button onclick='document.getElementById("fi").click()' style='padding:18px 14px;border-radius:4px;background:"+(S.scanning?"transparent":"#D4FF00")+";border:2px solid #D4FF00;color:"+(S.scanning?"#D4FF00":"#111")+";font-size:14px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;letter-spacing:1px;text-transform:uppercase'>"+
      (S.scanning?"<div style='width:22px;height:22px;border:2.5px solid #D4FF00;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite'></div>":"<svg width='26' height='26' viewBox='0 0 26 26' fill='none'><rect x='3' y='5' width='20' height='16' rx='2' stroke='currentColor' stroke-width='1.8'/><circle cx='13' cy='13' r='4' stroke='currentColor' stroke-width='1.8'/><rect x='9' y='3' width='8' height='3' rx='1' fill='currentColor'/></svg>")+
      (S.scanning?"Читаем...":"Сфото чек")+"</button>"+
      "<button onclick='togM()' style='padding:18px 14px;border-radius:4px;background:transparent;border:2px solid #333;color:#888;font-size:14px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;letter-spacing:1px;text-transform:uppercase'>"+
      "<svg width='26' height='26' viewBox='0 0 26 26' fill='none'><path d='M13 4v18M4 13h18' stroke='currentColor' stroke-width='2' stroke-linecap='round'/></svg>Вручную</button></div>"+
      "<input id='fi' type='file' accept='image/*' capture='environment' style='display:none'/>"+
      sprev+mform+rlist+
      (S.receipts.length===0&&!S.scan&&!S.mOpen?"<div style='text-align:center;color:#444;margin-top:48px;font-size:14px;line-height:1.7'>Пока пусто.<br/>Сфотографируй чек или добавь вручную.</div>":"");
  }

  if(S.tab==="itog"){
    if(all.length===0){
      body="<div style='text-align:center;color:#444;margin-top:60px;font-size:14px;line-height:1.7'>Пока никто ничего не отметил.</div>";
    }else{
      var hero=total>0?"<div style='background:#222;border:1px solid #333;border-radius:4px;padding:20px 22px;margin-bottom:14px'><div style='font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px'>Итог по кассе</div><div style='font-size:44px;font-weight:900;color:#D4FF00;line-height:1'>"+fmt(total)+"</div><div style='font-size:13px;color:#888;margin-top:6px'>С каждого: <b style='color:#fff'>"+fmt(pp)+"</b> · "+all.length+" участников</div></div>":"";
      var cards=all.map(function(person){
        var mI=S.items.filter(function(i){return i.takenBy===person;});
        var mR=S.receipts.filter(function(r){return r.who===person;});
        var paid=mR.reduce(function(s,r){return s+r.amount;},0);
        var bln=paid-pp;
        var badge=total>0?"<div style='padding:6px 10px;border-radius:4px;background:"+(bln>50?"rgba(212,255,0,0.1)":bln<-50?"rgba(255,68,68,0.1)":"#1a1a1a")+";border:1px solid "+(bln>50?"#D4FF00":bln<-50?"#FF4444":"#333")+"'><div style='font-size:10px;font-weight:700;color:"+(bln>50?"#D4FF00":bln<-50?"#FF4444":"#666")+";text-align:center;text-transform:uppercase'>"+(bln>50?"получить":bln<-50?"должен":"ок")+"</div>"+(Math.abs(bln)>50?"<div style='font-size:15px;font-weight:900;color:"+(bln>50?"#D4FF00":"#FF4444")+";text-align:center'>"+fmt(Math.abs(bln))+"</div>":"")+"</div>":"";
        var tags=mI.length>0?"<div style='padding:12px 18px;border-bottom:"+(mR.length>0?"1px solid #333":"none")+"'><div style='font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px'>Везёт</div><div style='display:flex;flex-wrap:wrap;gap:6px'>"+mI.map(function(item){return "<span style='font-size:12px;font-weight:500;background:#1a1a1a;border-radius:4px;padding:4px 10px;border:1px solid #333;color:#ccc'>"+item.name+"</span>";}).join("")+"</div></div>":"";
        var rrows=mR.length>0?"<div style='padding:12px 18px'><div style='font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px'>Оплатил</div>"+mR.map(function(r,i){return "<div style='display:flex;justify-content:space-between;padding:5px 0;border-bottom:"+(i<mR.length-1?"1px solid #333":"none")+"'><span style='font-size:13px;color:#888'>"+r.label+"</span><span style='font-size:16px;font-weight:900;color:#D4FF00'>"+fmt(r.amount)+"</span></div>";}).join("")+"</div>":"";
        return "<div style='background:#222;border-radius:4px;border:1px solid #333;margin-bottom:12px;overflow:hidden'><div style='display:flex;align-items:center;gap:12px;padding:16px 18px 14px;border-bottom:"+(mI.length>0||mR.length>0?"1px solid #333":"none")+"'>"+ava(person,40)+"<div style='flex:1'><div style='font-size:18px;font-weight:900;letter-spacing:1px;text-transform:uppercase'>"+person+"</div><div style='font-size:12px;color:#888;margin-top:2px'>"+mI.length+" вещей · "+fmt(paid)+"</div></div>"+badge+"</div>"+tags+rrows+"</div>";
      }).join("");
      var dbtrs=bal.filter(function(b){return b.owes>50;}).sort(function(a,b){return b.owes-a.owes;});
      var crdts=bal.filter(function(b){return b.owes<-50;}).sort(function(a,b){return a.owes-b.owes;});
      var trf="";
      if(total>0&&dbtrs.length>0){
        trf="<div style='background:#222;border-radius:4px;border:1px solid #333;padding:16px 18px;margin-bottom:14px'><div style='font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px'>Кто кому переводит</div>"+
        dbtrs.map(function(d){return crdts.map(function(c){return "<div style='display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #333'>"+ava(d.name,26)+"<div style='flex:1;font-size:13px'><b>"+d.name+"</b><span style='color:#666'> → </span><b>"+c.name+"</b></div><span style='font-size:18px;font-weight:900;color:#D4FF00'>"+fmt(Math.min(d.owes,-c.owes))+"</span></div>";}).join("");}).join("")+"</div>";
      }
      body=hero+cards+trf;
    }
  }

  var tabs=[{k:"list",l:"СПИСОК",b:unc>0?unc:null,bc:"#FF9500",ac:"#D4FF00"},{k:"cash",l:"КАССА",b:S.receipts.length>0?S.receipts.length:null,bc:"#60A5FA",ac:"#60A5FA"},{k:"itog",l:"ИТОГ",b:null,bc:"#C084FC",ac:"#C084FC"}];
  var tabbar="<div style='position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(17,17,17,0.97);backdrop-filter:blur(16px);border-top:2px solid #D4FF00;display:flex;padding-bottom:env(safe-area-inset-bottom,0px)'>"+
    tabs.map(function(t){
      var on=S.tab===t.k;
      return "<button data-tab='"+t.k+"' style='flex:1;padding:10px 8px 12px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative'>"+
        (t.b!=null?"<div style='position:absolute;top:7px;right:calc(50% - 18px);background:"+t.bc+";color:#fff;border-radius:4px;font-size:9px;font-weight:700;padding:1px 5px;min-width:15px;text-align:center'>"+t.b+"</div>":"")+
        "<span style='font-size:14px;font-weight:900;color:"+(on?t.ac:"#555")+";letter-spacing:2px;text-transform:uppercase'>"+t.l+"</span>"+
        (on?"<div style='width:20px;height:2px;background:"+t.ac+"'></div>":"")+
        "</button>";
    }).join("")+"</div>";

  var toastHtml=S.toast?"<div style='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#D4FF00;color:#111;padding:10px 20px;border-radius:4px;font-size:13px;font-weight:800;box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:100;white-space:nowrap;animation:tst 0.22s ease'>"+S.toast+"</div>":"";
  var rst="<div style='text-align:center;margin-top:28px'><button onclick='resetAll()' style='background:none;border:none;cursor:pointer;color:#333;font-size:11px;font-weight:600;padding:8px;text-transform:uppercase;letter-spacing:1px'>Сбросить всё</button></div>";

  // Attach file input handler after render via JS
  setTimeout(function(){
    var fi=document.getElementById("fi");
    if(fi)fi.onchange=function(){handleFile(this);};
  },0);

  return hdr+"<div style='max-width:640px;margin:0 auto;padding:16px 16px 8px'>"+body+rst+"</div>"+tabbar+toastHtml;
}

load();
</script>
</body>
</html>
